<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGafinatorXD - Afinador Profesional</title>
    <style>
        :root {
            --negro: #0a0a0a;
            --azul: #00f0ff;
            --azul-oscuro: #00b8cc;
            --gris: #1f1f1f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, var(--negro), #001122);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            background: rgba(10, 10, 10, 0.95);
            width: 100%;
            padding: 20px 0;
            text-align: center;
            border-bottom: 3px solid var(--azul);
            box-shadow: 0 4px 20px rgba(0, 240, 255, 0.2);
        }

        .logo {
            font-size: 3rem;
            font-weight: bold;
            color: var(--azul);
            text-shadow: 0 0 20px var(--azul);
            letter-spacing: 2px;
        }

        .subtitle {
            color: #88ddff;
            margin-top: 8px;
            font-size: 1.1rem;
        }

        .container {
            max-width: 900px;
            width: 100%;
            padding: 30px 20px;
            flex: 1;
        }

        .instrument-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .btn-instrument {
            padding: 14px 28px;
            font-size: 1.1rem;
            background: var(--gris);
            color: white;
            border: 2px solid #333;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-instrument.active {
            background: var(--azul);
            color: black;
            border-color: var(--azul);
            box-shadow: 0 0 25px var(--azul);
        }

        .tuner-display {
            background: #111;
            border: 4px solid var(--azul);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.3);
            margin-bottom: 30px;
        }

        .note {
            font-size: 6rem;
            font-weight: bold;
            color: var(--azul);
            text-shadow: 0 0 30px var(--azul);
            margin-bottom: 10px;
            min-height: 100px;
        }

        .frequency {
            font-size: 1.5rem;
            color: #88ddff;
        }

        .meter {
            height: 20px;
            background: #222;
            border-radius: 10px;
            margin: 25px 0;
            position: relative;
            overflow: hidden;
        }

        .needle {
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            background: var(--azul);
            box-shadow: 0 0 15px var(--azul);
            transition: left 0.1s linear;
        }

        .strings {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .string {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .string:hover {
            border-color: var(--azul);
            transform: translateY(-3px);
        }

        .string-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--azul);
        }

        .string-note {
            font-size: 2rem;
            color: white;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 0.9rem;
        }

        .status {
            margin-top: 20px;
            font-size: 1.1rem;
            padding: 12px 24px;
            border-radius: 50px;
            display: inline-block;
        }

        .status.ready {
            background: rgba(0, 240, 255, 0.1);
            color: var(--azul);
            border: 1px solid var(--azul);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">KGafinadorXD</div>
        <p class="subtitle">Afinador Profesional para Guitarra y Banjo</p>
    </header>

    <div class="container">
        <!-- Selector de instrumento -->
        <div class="instrument-selector">
            <button class="btn-instrument active" data-instrument="guitar">🎸 Guitarra</button>
            <button class="btn-instrument" data-instrument="banjo">🪕 Banjo</button>
        </div>

        <!-- Pantalla principal del afinador -->
        <div class="tuner-display">
            <div id="note" class="note">-</div>
            <div id="frequency" class="frequency">--- Hz</div>
            
            <div class="meter">
                <div id="needle" class="needle"></div>
            </div>

            <div id="status" class="status ready">Listo para afinar • Usa el micrófono</div>
        </div>

        <!-- Cuerdas -->
        <div id="strings" class="strings">
            <!-- Se llenarán con JavaScript -->
        </div>
    </div>

    <footer>
        <p>KGafinatorXD © 2026 • Hecho con pasión para músicos</p>
    </footer>

    <script>
        // Datos de las cuerdas
        const instruments = {
            guitar: [
                { name: "E", note: "Mi", freq: 82.4, string: "6ª" },
                { name: "A", note: "La", freq: 110.0, string: "5ª" },
                { name: "D", note: "Re", freq: 146.8, string: "4ª" },
                { name: "G", note: "Sol", freq: 196.0, string: "3ª" },
                { name: "B", note: "Si", freq: 246.9, string: "2ª" },
                { name: "E", note: "Mi", freq: 329.6, string: "1ª" }
            ],
            banjo: [
                { name: "G", note: "Sol", freq: 392.0, string: "5ª" },
                { name: "D", note: "Re", freq: 294.0, string: "4ª" },
                { name: "G", note: "Sol", freq: 196.0, string: "3ª" },
                { name: "B", note: "Si", freq: 246.9, string: "2ª" },
                { name: "D", note: "Re", freq: 294.0, string: "1ª" }
            ]
        };

        let currentInstrument = 'guitar';
        let currentStringIndex = 0;

        // Renderizar cuerdas
        function renderStrings() {
            const container = document.getElementById('strings');
            container.innerHTML = '';
            
            instruments[currentInstrument].forEach((string, index) => {
                const div = document.createElement('div');
                div.className = 'string';
                div.innerHTML = `
                    <div class="string-name">${string.string}</div>
                    <div class="string-note">${string.name}</div>
                    <small style="color:#666;">${string.note}</small>
                `;
                div.onclick = () => {
                    currentStringIndex = index;
                    document.getElementById('note').textContent = string.name;
                };
                container.appendChild(div);
            });
        }

        // Cambiar instrumento
        document.querySelectorAll('.btn-instrument').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.btn-instrument').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                currentInstrument = btn.dataset.instrument;
                currentStringIndex = 0;
                renderStrings();
                
                // Resetear pantalla
                document.getElementById('note').textContent = instruments[currentInstrument][0].name;
            });
        });

        // Inicializar
        window.onload = () => {
            renderStrings();
            document.getElementById('note').textContent = instruments.guitar[0].name;
        };

        // Nota: Este es un diseño profesional. Para hacer un afinador real necesitarías Web Audio API + detección de frecuencia.
        // Si quieres la versión completa con micrófono real, dime y te la hago.
    </script>
</body>
</html>
