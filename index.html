<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGafinatorXD - Afinador Profesional</title>
    <style>
        :root {
            --negro: #0a0a0a;
            --azul: #00f0ff;
            --azul-oscuro: #00b8cc;
            --gris: #1f1f1f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, var(--negro), #001122);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            background: rgba(10, 10, 10, 0.95);
            width: 100%;
            padding: 25px 0;
            text-align: center;
            border-bottom: 4px solid var(--azul);
            box-shadow: 0 4px 30px rgba(0, 240, 255, 0.25);
        }

        .logo {
            font-size: 3.2rem;
            font-weight: 900;
            color: var(--azul);
            text-shadow: 0 0 25px var(--azul);
            letter-spacing: 3px;
        }

        .subtitle {
            color: #88ddff;
            margin-top: 8px;
            font-size: 1.3rem;
            font-weight: 500;
        }

        .container {
            max-width: 920px;
            width: 100%;
            padding: 30px 20px;
            flex: 1;
        }

        .instrument-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .btn-instrument {
            padding: 16px 32px;
            font-size: 1.2rem;
            background: var(--gris);
            color: white;
            border: 2px solid #444;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-instrument.active {
            background: var(--azul);
            color: #000;
            border-color: var(--azul);
            box-shadow: 0 0 30px var(--azul);
            transform: scale(1.05);
        }

        .tuner-display {
            background: #0f0f0f;
            border: 5px solid var(--azul);
            border-radius: 25px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.4);
            margin-bottom: 40px;
        }

        .note {
            font-size: 7rem;
            font-weight: 900;
            color: var(--azul);
            text-shadow: 0 0 40px var(--azul);
            min-height: 120px;
            line-height: 1;
        }

        .frequency {
            font-size: 1.6rem;
            color: #88ddff;
            margin-bottom: 20px;
        }

        .meter {
            height: 28px;
            background: #222;
            border-radius: 14px;
            margin: 30px 0;
            position: relative;
            overflow: hidden;
            border: 2px solid #333;
        }

        .needle {
            position: absolute;
            top: 0;
            left: 50%;
            width: 6px;
            height: 100%;
            background: linear-gradient(to bottom, var(--azul), #00ffff);
            box-shadow: 0 0 20px var(--azul);
            transition: left 0.08s linear;
        }

        .strings {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 18px;
        }

        .string {
            background: #1a1a1a;
            border: 3px solid #333;
            border-radius: 16px;
            padding: 20px 15px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .string:hover {
            border-color: var(--azul);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 240, 255, 0.2);
        }

        .string-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--azul);
        }

        .string-note {
            font-size: 2.4rem;
            font-weight: 700;
            margin: 8px 0;
        }

        .status {
            margin-top: 25px;
            font-size: 1.15rem;
            padding: 14px 30px;
            border-radius: 50px;
            background: rgba(0, 240, 255, 0.1);
            color: var(--azul);
            border: 1px solid var(--azul);
            display: inline-block;
        }

        footer {
            margin-top: auto;
            padding: 25px;
            text-align: center;
            color: #555;
            font-size: 0.95rem;
        }

        @media (max-width: 600px) {
            .note { font-size: 5.5rem; }
            .logo { font-size: 2.6rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">KGafinadorXD</div>
        <p class="subtitle">Afinador Profesional para Guitarra y Banjo</p>
    </header>

    <div class="container">
        <!-- Selector de instrumento -->
        <div class="instrument-selector">
            <button class="btn-instrument active" data-instrument="guitar">🎸 Guitarra</button>
            <button class="btn-instrument" data-instrument="banjo">🪕 Banjo</button>
        </div>

        <!-- Pantalla del afinador -->
        <div class="tuner-display">
            <div id="note" class="note">E</div>
            <div id="frequency" class="frequency">329.6 Hz</div>
            
            <div class="meter">
                <div id="needle" class="needle"></div>
            </div>

            <div id="status" class="status">Listo • Activa el micrófono para afinar</div>
        </div>

        <!-- Cuerdas -->
        <div id="strings" class="strings"></div>
    </div>

    <footer>
        <p>KGafinatorXD © 2026 • Afinador bonito y fácil de usar</p>
    </footer>

    <script>
        const instruments = {
            guitar: [
                { string: "6ª", name: "E", note: "Mi", freq: 82.4 },
                { string: "5ª", name: "A", note: "La", freq: 110.0 },
                { string: "4ª", name: "D", note: "Re", freq: 146.8 },
                { string: "3ª", name: "G", note: "Sol", freq: 196.0 },
                { string: "2ª", name: "B", note: "Si", freq: 246.9 },
                { string: "1ª", name: "E", note: "Mi", freq: 329.6 }
            ],
            banjo: [
                { string: "5ª", name: "G", note: "Sol", freq: 392.0 },
                { string: "4ª", name: "D", note: "Re", freq: 294.0 },
                { string: "3ª", name: "G", note: "Sol", freq: 196.0 },
                { string: "2ª", name: "B", note: "Si", freq: 246.9 },
                { string: "1ª", name: "D", note: "Re", freq: 294.0 }
            ]
        };

        let currentInstrument = 'guitar';

        function renderStrings() {
            const container = document.getElementById('strings');
            container.innerHTML = '';

            instruments[currentInstrument].forEach((str, index) => {
                const div = document.createElement('div');
                div.className = 'string';
                div.innerHTML = `
                    <div class="string-name">${str.string}</div>
                    <div class="string-note">${str.name}</div>
                    <small style="color:#888;">${str.note}</small>
                `;
                div.onclick = () => {
                    document.getElementById('note').textContent = str.name;
                    document.getElementById('frequency').textContent = str.freq + " Hz";
                };
                container.appendChild(div);
            });
        }

        // Cambiar entre Guitarra y Banjo
        document.querySelectorAll('.btn-instrument').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.btn-instrument').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                currentInstrument = btn.dataset.instrument;
                renderStrings();

                // Mostrar la primera cuerda
                const first = instruments[currentInstrument][0];
                document.getElementById('note').textContent = first.name;
                document.getElementById('frequency').textContent = first.freq + " Hz";
            });
        });

        // Inicializar la página
        window.onload = () => {
            renderStrings();
            const first = instruments.guitar[0];
            document.getElementById('note').textContent = first.name;
            document.getElementById('frequency').textContent = first.freq + " Hz";
        };
    </script>
</body>
</html>
