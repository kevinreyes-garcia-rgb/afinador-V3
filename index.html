<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGafinatorXD - Afinador Profesional</title>
    <style>
        :root {
            --negro: #0a0a0a;
            --azul: #00f0ff;
            --azul-oscuro: #00b8cc;
            --gris: #1f1f1f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, var(--negro), #001122);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background: rgba(10, 10, 10, 0.95);
            width: 100%;
            padding: 25px 0;
            text-align: center;
            border-bottom: 4px solid var(--azul);
            box-shadow: 0 4px 30px rgba(0, 240, 255, 0.25);
        }

        .logo {
            font-size: 3.2rem;
            font-weight: 900;
            color: var(--azul);
            text-shadow: 0 0 25px var(--azul);
            letter-spacing: 3px;
        }

        .subtitle {
            color: #88ddff;
            margin-top: 8px;
            font-size: 1.3rem;
        }

        .container {
            max-width: 920px;
            width: 100%;
            padding: 30px 20px;
            flex: 1;
        }

        .instrument-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn-instrument {
            padding: 16px 32px;
            font-size: 1.2rem;
            background: var(--gris);
            color: white;
            border: 2px solid #444;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-instrument.active {
            background: var(--azul);
            color: #000;
            border-color: var(--azul);
            box-shadow: 0 0 30px var(--azul);
        }

        .tuner-display {
            background: #0f0f0f;
            border: 5px solid var(--azul);
            border-radius: 25px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.4);
            margin-bottom: 30px;
        }

        .note {
            font-size: 7rem;
            font-weight: 900;
            color: var(--azul);
            text-shadow: 0 0 40px var(--azul);
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .frequency {
            font-size: 1.6rem;
            color: #88ddff;
        }

        .meter {
            height: 28px;
            background: #222;
            border-radius: 14px;
            margin: 30px 0;
            position: relative;
            overflow: hidden;
            border: 2px solid #333;
        }

        .needle {
            position: absolute;
            top: 0;
            left: 50%;
            width: 6px;
            height: 100%;
            background: linear-gradient(to bottom, var(--azul), #00ffff);
            box-shadow: 0 0 20px var(--azul);
            transition: left 0.1s ease-out;
            transform: translateX(-50%);
        }

        .strings {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 18px;
        }

        .string {
            background: #1a1a1a;
            border: 3px solid #333;
            border-radius: 16px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .string:hover {
            border-color: var(--azul);
            transform: translateY(-5px);
        }

        .string-name { font-size: 1.5rem; font-weight: bold; color: var(--azul); }
        .string-note { font-size: 2.4rem; font-weight: 700; margin: 8px 0; }

        button#micButton {
            margin: 20px auto;
            display: block;
            padding: 16px 40px;
            font-size: 1.3rem;
            background: #00f0ff;
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 25px var(--azul);
        }

        .status {
            margin-top: 15px;
            font-size: 1.1rem;
            padding: 12px 25px;
            border-radius: 50px;
            display: inline-block;
        }

        footer {
            margin-top: auto;
            padding: 25px;
            text-align: center;
            color: #555;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">KGafinadorXD</div>
        <p class="subtitle">Afinador Profesional con Micrófono</p>
    </header>

    <div class="container">
        <div class="instrument-selector">
            <button class="btn-instrument active" data-instrument="guitar">🎸 Guitarra</button>
            <button class="btn-instrument" data-instrument="banjo">🪕 Banjo</button>
        </div>

        <div class="tuner-display">
            <div id="note" class="note">-</div>
            <div id="frequency" class="frequency">--- Hz</div>
            
            <div class="meter">
                <div id="needle" class="needle"></div>
            </div>

            <button id="micButton">🎤 Activar Micrófono</button>
            <div id="status" class="status">Micrófono apagado</div>
        </div>

        <div id="strings" class="strings"></div>
    </div>

    <footer>
        <p>KGafinatorXD © 2026 • Afinador con detección real de pitch</p>
    </footer>

    <script>
        const instruments = {
            guitar: [
                { string: "6ª", name: "E2", freq: 82.41 },
                { string: "5ª", name: "A2", freq: 110.00 },
                { string: "4ª", name: "D3", freq: 146.83 },
                { string: "3ª", name: "G3", freq: 196.00 },
                { string: "2ª", name: "B3", freq: 246.94 },
                { string: "1ª", name: "E4", freq: 329.63 }
            ],
            banjo: [
                { string: "5ª", name: "G4", freq: 392.00 },
                { string: "4ª", name: "D3", freq: 146.83 },
                { string: "3ª", name: "G3", freq: 196.00 },
                { string: "2ª", name: "B3", freq: 246.94 },
                { string: "1ª", name: "D4", freq: 293.66 }
            ]
        };

        let currentInstrument = 'guitar';
        let audioContext, analyser, dataArray;
        let isListening = false;
        const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        function autoCorrelate(buf, sampleRate) {
            let SIZE = buf.length;
            let rms = 0;
            for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.01) return -1; // Señal muy débil

            let r1 = 0, r2 = SIZE - 1, thres = 0.2;
            for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
            for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }
            buf = buf.slice(r1, r2);
            SIZE = buf.length;

            let c = new Array(SIZE).fill(0);
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE - i; j++) {
                    c[i] = c[i] + buf[j] * buf[j + i];
                }
            }

            let d = 0;
            while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < SIZE; i++) {
                if (c[i] > maxval) {
                    maxval = c[i];
                    maxpos = i;
                }
            }
            let T0 = maxpos;
            return sampleRate / T0;
        }

        function updatePitch() {
            if (!isListening) return;

            analyser.getFloatTimeDomainData(dataArray);
            const freq = autoCorrelate(dataArray, audioContext.sampleRate);

            if (freq !== -1 && freq > 60 && freq < 1000) {
                const noteNum = 12 * (Math.log(freq / 440) / Math.log(2));
                const n = Math.round(noteNum) + 69;
                const noteName = noteStrings[n % 12];
                const cents = Math.floor(100 * (noteNum - Math.round(noteNum)));

                document.getElementById('note').textContent = noteName;
                document.getElementById('frequency').textContent = freq.toFixed(1) + " Hz";
                
                // Centrar la aguja: -50 cents es 0%, 0 cents es 50%, 50 cents es 100%
                let move = 50 + (cents); 
                document.getElementById('needle').style.left = move + "%";
            }
            requestAnimationFrame(updatePitch);
        }

        async function startMicrophone() {
            const button = document.getElementById('micButton');
            const status = document.getElementById('status');

            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                dataArray = new Float32Array(analyser.fftSize);
                source.connect(analyser);
                
                isListening = true;
                button.textContent = "🎤 Escuchando...";
                button.style.background = "#00ccaa";
                status.textContent = "Toca una cuerda de tu " + (currentInstrument === 'guitar' ? 'Guitarra' : 'Banjo');
                
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                updatePitch();
            } catch (err) {
                status.textContent = "Error: Acceso al micro denegado.";
                status.style.color = "#ff6666";
            }
        }

        function renderStrings() {
            const container = document.getElementById('strings');
            container.innerHTML = '';
            instruments[currentInstrument].forEach(str => {
                const div = document.createElement('div');
                div.className = 'string';
                div.innerHTML = `
                    <div class="string-name">${str.string}</div>
                    <div class="string-note">${str.name.replace(/\d/, '')}</div>
                    <small style="color:#888;">${str.freq} Hz</small>
                `;
                container.appendChild(div);
            });
        }

        document.querySelectorAll('.btn-instrument').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.btn-instrument').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentInstrument = btn.dataset.instrument;
                renderStrings();
            });
        });

        document.getElementById('micButton').addEventListener('click', startMicrophone);

        window.onload = () => {
            renderStrings();
        };
    </script>
</body>
</html>
